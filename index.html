<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Apps">
<meta name="theme-color" content="#0f172a">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>My Apps</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-1: #0f172a;
    --bg-2: #1e1b4b;
    --card: rgba(255, 255, 255, 0.05);
    --card-hover: rgba(255, 255, 255, 0.09);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #38bdf8;
    --status-live-bg: rgba(34, 197, 94, 0.15);
    --status-live-text: #4ade80;
    --status-wip-bg: rgba(234, 179, 8, 0.15);
    --status-wip-text: #facc15;
    --status-soon-bg: rgba(148, 163, 184, 0.15);
    --status-soon-text: #cbd5e1;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-1);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    background-image:
      radial-gradient(ellipse at top left, rgba(56,189,248,0.12) 0%, transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(168,85,247,0.12) 0%, transparent 45%),
      linear-gradient(180deg, var(--bg-1) 0%, #1a1538 100%);
    background-attachment: fixed;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 20px;
    padding-top: max(env(safe-area-inset-top, 32px), 32px);
    padding-bottom: max(env(safe-area-inset-bottom, 32px), 32px);
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header .glyph {
    font-size: 44px; display: block; margin-bottom: 8px;
  }
  header h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header p {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .card {
    display: flex;
    flex-direction: column;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    min-height: 150px;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: var(--card-tint, transparent);
    opacity: 0.6;
    pointer-events: none;
  }
  .card > * { position: relative; }
  .card:hover {
    border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
    background: var(--card-hover);
  }
  .card:active { transform: translateY(0); }
  .card.disabled {
    cursor: default;
    opacity: 0.55;
  }
  .card.disabled:hover { transform: none; border-color: var(--border); background: var(--card); }

  .card .top {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 10px; gap: 10px;
  }
  .card .icon {
    font-size: 32px; line-height: 1;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--border);
  }

  .status {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status.live { background: var(--status-live-bg); color: var(--status-live-text); }
  .status.wip  { background: var(--status-wip-bg);  color: var(--status-wip-text); }
  .status.soon { background: var(--status-soon-bg); color: var(--status-soon-text); }

  .card h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin-bottom: 4px;
  }
  .card p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.45;
    flex: 1;
  }
  .card .url {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 12px;
    font-family: ui-monospace, Menlo, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    opacity: 0.7;
  }

  footer {
    margin-top: 36px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
  footer code {
    background: rgba(255, 255, 255, 0.07);
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 11px;
  }
  footer .links {
    margin-top: 8px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="glyph">🧭</span>
    <h1>My Apps</h1>
    <p>One bookmark, all the things I'm building.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    Edit your apps list in <code>index.html</code> → <code>const APPS = [&hellip;]</code>
  </footer>
</div>

<script>
  // ── Edit me ──────────────────────────────────────────────────────────────
  // Add or remove apps here. Set status to: 'live' | 'wip' | 'soon'
  const APPS = [
    {
      name: 'Meditate',
      icon: '🪷',
      desc: 'Guided meditation & mantras for focus and calm.',
      url: 'https://saucedah.github.io/meditation/',  // <-- update if your Pages URL differs
      status: 'live',
      tint: 'linear-gradient(135deg, rgba(168,85,247,0.10), rgba(56,189,248,0.05))'
    },
    {
      name: 'Workout',
      icon: '💪',
      desc: 'AI-built routines tailored to your gym & progress.',
      url: 'https://workout-8ol.pages.dev/',
      status: 'live',
      tint: 'linear-gradient(135deg, rgba(239,68,68,0.10), rgba(245,158,11,0.05))'
    },
    {
      name: 'Notes',
      icon: '📒',
      desc: 'Things to remember, things to buy, projects.',
      url: '',  // <-- paste your Pages URL here once deployed
      status: 'wip',
      tint: 'linear-gradient(135deg, rgba(217,119,6,0.10), rgba(13,148,136,0.05))'
    },
    {
      name: 'My Finances',
      icon: '💰',
      desc: 'Budget & expense tracking.',
      url: '',  // <-- paste your Pages URL here once deployed
      status: 'wip',
      tint: 'linear-gradient(135deg, rgba(34,197,94,0.10), rgba(56,189,248,0.05))'
    }
    // To add a new app, copy a block above, paste it here, and fill in the fields.
  ];
  // ─────────────────────────────────────────────────────────────────────────

  const STATUS_LABEL = {
    live: 'Live',
    wip:  'In progress',
    soon: 'Coming soon'
  };

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (const app of APPS) {
      const hasUrl = !!(app.url && app.status === 'live');
      const node = document.createElement(hasUrl ? 'a' : 'div');
      node.className = 'card' + (hasUrl ? '' : ' disabled');
      if (hasUrl) {
        node.href = app.url;
        node.target = '_blank';
        node.rel = 'noopener';
      }
      if (app.tint) node.style.setProperty('--card-tint', app.tint);

      const top = document.createElement('div');
      top.className = 'top';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = app.icon || '🔹';

      const status = document.createElement('span');
      status.className = 'status ' + (app.status || 'soon');
      status.textContent = STATUS_LABEL[app.status] || 'Coming soon';

      top.appendChild(icon);
      top.appendChild(status);

      const h2 = document.createElement('h2');
      h2.textContent = app.name;

      const p = document.createElement('p');
      p.textContent = app.desc || '';

      node.appendChild(top);
      node.appendChild(h2);
      node.appendChild(p);

      if (app.url) {
        const u = document.createElement('div');
        u.className = 'url';
        try { u.textContent = new URL(app.url).host; }
        catch { u.textContent = app.url; }
        node.appendChild(u);
      }

      grid.appendChild(node);
    }
  }

  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
